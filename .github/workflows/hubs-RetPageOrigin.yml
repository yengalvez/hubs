name: hubs
on:
  push:
    branches:
    paths-ignore: ["README.md"]
  workflow_dispatch:
    # Smoke instances aren't currently set up as of 2024-09-08
    # so commenting out the smoke stuff for now.
    # inputs:
    #   smokeroom-choice:
    #     type: choice
    #     description: Select smoke instance
    #     options:
    #       - "smoke01"
    #       - "smoke02"
    #       - "smoke03"
    #       - "smoke04"
    #       - "smoke05"

jobs:
  turkeyGitops:
    # This workflow is intended for Hubs Foundation infra (turkey). In forks, required secrets are
    # usually not configured and the run will fail noisily on every push.
    #
    # NOTE: This job calls a reusable workflow (`uses:`). GitHub Actions does not allow referencing
    # the `secrets.*` context in the job-level `if:` expression for reusable workflow calls, which
    # causes a workflow parse-time error like:
    #   "Unrecognized named-value: 'secrets'"
    #
    # To keep forks working, gate this job to the upstream org (or explicitly enable it via a repo var).
    if: ${{ github.repository_owner == 'Hubs-Foundation' || vars.ENABLE_TURKEY_GITOPS == 'true' }}
    uses: Hubs-Foundation/hubs-ops/.github/workflows/turkeyGitops.yml@master
    with:
      registry: hubsfoundation
      dockerfile: RetPageOriginDockerfile
      k8s_deployment: hubs
      k8s_deployment_container: hubs
      bio_script_path: scripts/hab-wrap-and-push.sh
      smoke-instance: ${{inputs.smokeroom-choice}}
    secrets:
      DOCKER_HUB_PWD: ${{ secrets.DOCKER_HUB_PWD }}
      GCP_TURKEYGITOPS_SA_JSON: ${{ secrets.GCP_TURKEYGITOPS_SA_JSON  }}
      BLDR_HAB_TOKEN: ${{ secrets.BLDR_HAB_TOKEN }}
      BLDR_RET_TOKEN: ${{ secrets.BLDR_RET_TOKEN }}
      BLDR_RET_PUB_B64: ${{ secrets.BLDR_RET_PUB_B64 }}
      BLDR_HAB_PVT_B64: ${{ secrets.BLDR_HAB_PVT_B64 }}
